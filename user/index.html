<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | MAsmmpanel</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Color Palette Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#22c55e',
                            600: '#16a34a',
                            800: '#166534',
                            900: '#14532d',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        
        /* Custom Scrollbar for Sidebar & Main Content */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        /* Mobile Sidebar Overlay Transition */
        #sidebar-overlay { transition: opacity 0.3s ease-in-out; }
        #sidebar { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="text-gray-800 antialiased overflow-hidden flex h-screen">

    <!-- Mobile Sidebar Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-20 hidden lg:hidden opacity-0 pointer-events-none"></div>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="bg-white w-64 border-r border-gray-200 flex flex-col z-30 fixed lg:relative h-full transform -translate-x-full lg:translate-x-0 shadow-xl lg:shadow-none">
        
        <!-- Sidebar Header (Logo) -->
        <div class="h-20 flex items-center px-6 border-b border-gray-100 bg-brand-50/50">
            <a href="../index.html" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center text-white font-bold text-lg shadow-sm">
                    M
                </div>
                <span class="font-bold text-xl text-brand-900 tracking-tight">MAsmmpanel</span>
            </a>
            <button id="close-sidebar-btn" class="ml-auto lg:hidden text-gray-500 hover:text-red-500">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <!-- Sidebar Links -->
        <div class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
            <p class="px-2 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Menu</p>
            
            <a href="#dashboard" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-brand-700 bg-brand-50 font-medium transition-colors" data-target="dashboard">
                <i class="fa-solid fa-cart-plus w-5 text-center"></i> New Order
            </a>
            <a href="#myorders" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-brand-600 font-medium transition-colors" data-target="myorders">
                <i class="fa-solid fa-box-open w-5 text-center"></i> My Orders
            </a>
        
            <a href="#refill" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-brand-600 font-medium transition-colors" data-target="refill">
                <i class="fa-solid fa-rotate w-5 text-center"></i> Refill History
            </a>
            <a href="#support" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-brand-600 font-medium transition-colors" data-target="support">
                <i class="fa-solid fa-headset w-5 text-center"></i> Support Tickets
            </a>
            <a href="#addfunds" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-brand-600 font-medium transition-colors" data-target="addfunds">
                <i class="fa-solid fa-wallet w-5 text-center"></i> Add Funds
            </a>
            <a href="#services" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-brand-600 font-medium transition-colors" data-target="services">
                <i class="fa-solid fa-tags w-5 text-center"></i> Services
            </a>
            <a href="#transactions" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-brand-600 font-medium transition-colors" data-target="transactions">
                <i class="fa-solid fa-money-bill-transfer w-5 text-center"></i> Transactions
            </a>
            <a href="#api" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-brand-600 font-medium transition-colors" data-target="api">
                <i class="fa-solid fa-code w-5 text-center"></i> API Docs
            </a>
            
            <p class="px-2 text-xs font-semibold text-gray-400 uppercase tracking-wider mt-6 mb-2">Account</p>
            
            <a href="#profile" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-brand-600 font-medium transition-colors" data-target="profile">
                <i class="fa-solid fa-user-gear w-5 text-center"></i> Profile Settings
            </a>
        </div>

        <!-- Sidebar Footer -->
        <div class="p-4 border-t border-gray-100">
            <button id="logout-btn" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-red-50 hover:text-red-600 font-medium transition-colors">
                <i class="fa-solid fa-right-from-bracket w-5 text-center"></i> Sign Out
            </button>
        </div>
    </aside>

    <!-- Main Content Wrapper -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
        
        <!-- Loading Overlay -->
        <div id="page-loader" class="absolute inset-0 bg-white z-50 flex flex-col items-center justify-center">
            <i class="fa-solid fa-spinner fa-spin text-4xl text-brand-500 mb-4"></i>
            <p class="text-gray-500 font-medium">Loading Dashboard...</p>
        </div>

        <!-- Top Header -->
        <header class="h-20 bg-white border-b border-gray-200 flex items-center justify-between px-4 sm:px-6 lg:px-8 shrink-0 z-10">
            <!-- Mobile Menu Toggle & Title -->
            <div class="flex items-center">
                <button id="open-sidebar-btn" class="lg:hidden text-gray-500 hover:text-brand-600 focus:outline-none p-2 mr-3">
                    <i class="fa-solid fa-bars text-2xl"></i>
                </button>
                <h1 id="page-title" class="text-xl font-bold text-gray-800">New Order</h1>
            </div>

            <!-- Header Right Section -->
            <div class="flex items-center gap-4 sm:gap-6">
                <!-- Notifications -->
                <button class="text-gray-400 hover:text-brand-500 transition-colors relative">
                    <i class="fa-regular fa-bell text-xl"></i>
                    <span class="absolute top-0 right-0 block h-2 w-2 rounded-full bg-red-500 ring-2 ring-white"></span>
                </button>

                <!-- User Dropdown (Simulated) -->
                <div class="flex items-center gap-3 border-l border-gray-200 pl-4 sm:pl-6">
                    <div class="w-10 h-10 rounded-full bg-brand-100 border border-brand-200 flex items-center justify-center text-brand-700 font-bold overflow-hidden">
                        <i class="fa-solid fa-user text-lg"></i>
                    </div>
                    <div class="hidden md:block text-left">
                        <p id="header-user-email" class="text-sm font-semibold text-gray-700 truncate max-w-[120px]">Loading...</p>
                        <p class="text-xs text-gray-500">User Panel</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <main class="flex-1 flex flex-col relative overflow-hidden bg-gray-50">
            
            <!-- Toast Notification Container (Global) -->
            <div id="toast-container" class="fixed top-24 right-4 z-[70] flex flex-col gap-2 pointer-events-none"></div>

            <!-- Floating WhatsApp Widget -->
            <a href="#" class="fixed bottom-6 right-6 w-14 h-14 bg-[#25D366] text-white rounded-full flex items-center justify-center text-3xl shadow-lg hover:scale-110 transition-transform z-50">
                <i class="fa-brands fa-whatsapp"></i>
            </a>

            <!-- Modules inject their HTML here -->
            <div id="user-content" class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 relative">
                <!-- Content handled by JS Router -->
            </div>

        </main>
    </div>

    <!-- Firebase Configuration & Integrated Logic (Auth + Router) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA1Oq5z1O7qEIzDgfgfqlTOjVoM3WDF-qQ",
            authDomain: "masmmpanel-7af8c.firebaseapp.com",
            projectId: "masmmpanel-7af8c",
            storageBucket: "masmmpanel-7af8c.firebasestorage.app",
            messagingSenderId: "954223775870",
            appId: "1:954223775870:web:faf21552d7478a53ff082f",
            measurementId: "G-WYKEH349PW"
        };

        // Initialize Firebase globally
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        window.firebaseApp = app;

        // Ensure App ID is set globally for modules
        window.__app_id = "masmmpanel-default"; 

        // ==========================================
        // MODULE: AUTHENTICATION GUARD
        // ==========================================
        const pageLoader = document.getElementById('page-loader');
        const headerEmail = document.getElementById('header-user-email');
        const logoutBtn = document.getElementById('logout-btn');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Security Check: Redirect Admin to admin panel
                if(user.email === 'mubashirarham12@gmail.com') {
                    window.location.href = '../admin/index.html';
                    return;
                }
                
                // Set UI for logged-in user
                headerEmail.innerText = user.email || "User";
                pageLoader.classList.add('hidden'); // Hide loader
            } else {
                // Not logged in -> Redirect to login page
                window.location.href = '../login.html';
            }
        });

        // Logout Event
        logoutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
            } catch (error) {
                console.error("Logout Failed", error);
            }
        });

        // ==========================================
        // MODULE: ROUTER & SIDEBAR MANAGER
        // ==========================================
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const openSidebarBtn = document.getElementById('open-sidebar-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        
        const navLinks = document.querySelectorAll('.nav-link');
        const pageTitle = document.getElementById('page-title');

        const viewTitles = {
            'dashboard': 'New Order',
            'myorders': 'My Orders',
            'services': 'Services',
            'orders': 'Order History',
            'refill': 'Refill History',
            'support': 'Support Tickets',
            'addfunds': 'Add Funds',
            'transactions': 'Payment History',
            'api': 'API Documentation',
            'profile': 'Profile Settings'
        };

        // Mobile Sidebar Controls
        function openSidebar() {
            sidebar.classList.remove('-translate-x-full');
            sidebarOverlay.classList.remove('hidden');
            setTimeout(() => {
                sidebarOverlay.classList.remove('opacity-0');
                sidebarOverlay.classList.add('opacity-100', 'pointer-events-auto');
            }, 10);
        }

        function closeSidebar() {
            sidebar.classList.add('-translate-x-full');
            sidebarOverlay.classList.remove('opacity-100', 'pointer-events-auto');
            sidebarOverlay.classList.add('opacity-0');
            setTimeout(() => {
                sidebarOverlay.classList.add('hidden');
            }, 300);
        }

        openSidebarBtn.addEventListener('click', openSidebar);
        closeSidebarBtn.addEventListener('click', closeSidebar);
        sidebarOverlay.addEventListener('click', closeSidebar);

        // Single Page Router Logic (Modular)
        function switchView(targetViewId) {
            // Reset nav links styling
            navLinks.forEach(link => {
                link.classList.remove('text-brand-700', 'bg-brand-50');
                link.classList.add('text-gray-600', 'hover:bg-gray-50', 'hover:text-brand-600');
            });

            // Highlight active nav link
            const activeLink = document.querySelector(`.nav-link[data-target="${targetViewId}"]`);
            if (activeLink) {
                activeLink.classList.remove('text-gray-600', 'hover:bg-gray-50', 'hover:text-brand-600');
                activeLink.classList.add('text-brand-700', 'bg-brand-50');
            }

            // Update Page Title
            if (viewTitles[targetViewId]) {
                pageTitle.innerText = viewTitles[targetViewId];
            }

            // Close sidebar on mobile
            if (window.innerWidth < 1024) closeSidebar();

            // DISPATCH EVENT: Tells the corresponding external JS module to inject its HTML
            window.dispatchEvent(new CustomEvent('user-section-load', { 
                detail: { section: targetViewId } 
            }));
        }

        // Attach clicks to sidebar links
        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const target = link.getAttribute('data-target');
                switchView(target);
                history.pushState(null, null, `#${target}`); 
            });
        });

        // Handle initial load based on URL hash
        function handleInitialRoute() {
            const hash = window.location.hash.replace('#', '');
            if (hash && viewTitles[hash]) {
                // Short delay to ensure modules have registered their event listeners
                setTimeout(() => switchView(hash), 100);
            } else {
                setTimeout(() => switchView('dashboard'), 100); // Default view
            }
        }

        handleInitialRoute();
    </script>

    <!-- External JS Modules -->
    <!-- These files contain the HTML and logic for each section -->
    <script type="module" src="../assets/js/user/dashboard.js"></script>
    <script type="module" src="../assets/js/user/myorders.js"></script>
    <script type="module" src="../assets/js/user/services.js"></script>
    <script type="module" src="../assets/js/user/refill.js"></script>
    <script type="module" src="../assets/js/user/support.js"></script>
    <script type="module" src="../assets/js/user/addfunds.js"></script>
    <script type="module" src="../assets/js/user/transactions.js"></script>
    <script type="module" src="../assets/js/user/api.js"></script>
    <script type="module" src="../assets/js/user/profile.js"></script>

</body>
</html>
