    <!-- Main Content Wrapper -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative">

        <!-- Top Header -->

            <div class="flex items-center gap-4 sm:gap-6">

                        <p class="text-xs text-brand-600 font-semibold" id="header-admin-email">Loading...</p>

        <!-- Dynamic Content Area -->

            <div id="admin-content" class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 relative">
                <!-- Content injected by JS Modules -->
            </div>
        </main>

    <!-- Firebase & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA1Oq5z1O7qEIzDgfgfqlTOjVoM3WDF-qQ",
            authDomain: "masmmpanel-7af8c.firebaseapp.com",
            projectId: "masmmpanel-7af8c",
            storageBucket: "masmmpanel-7af8c.firebasestorage.app",
            messagingSenderId: "954223775870",
            appId: "1:954223775870:web:faf21552d7478a53ff082f",
            measurementId: "G-WYKEH349PW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        window.firebaseApp = app;
        window.__app_id = "masmmpanel-default"; 

        // ==========================================
        // AUTHENTICATION GUARD & RELOAD FIX
        // ==========================================
        const pageLoader = document.getElementById('page-loader');
        const headerEmail = document.getElementById('header-admin-email');
        const logoutBtn = document.getElementById('logout-btn');
        let initialLoadDone = false;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Strict Admin Email Check
                if(user.email !== 'mubashirarham12@gmail.com') {
                    window.location.replace('../user/index.html');
                    return;
                }
                
                headerEmail.innerText = user.email;
                pageLoader.classList.add('hidden');

                // Prevent the initial routing from looping every time auth state is poked
                if (!initialLoadDone) {
                    initialLoadDone = true;
                    handleInitialRoute();
                }
            } else {
                // If not logged in, go to login. Use replace to avoid back-button loops.
                window.location.replace('../login.html');
            }
        });

        logoutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
            } catch (error) {
                console.error("Logout Failed", error);
            }
        });

        // ==========================================
        // ROUTER & UI MANAGER
        // ==========================================
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const openSidebarBtn = document.getElementById('open-sidebar-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        const navLinks = document.querySelectorAll('.nav-link');
        const pageTitle = document.getElementById('page-title');

        const viewTitles = {
            'dashboard': 'Dashboard Overview',
            'orders': 'Order Management',
            'refills': 'Refill Management',
            'deposits': 'Deposit Management',
            'support': 'Support Tickets',
            'users': 'User Management',
            'categories': 'Categories',
            'services': 'Services',
            'api': 'API Providers',
            'payments': 'Payment Gateways',
            'automation': 'System Automation',
            'childpanels': 'Manage SaaS Tenants',
            'blogs': 'Platform Blog & Features',
            'settings': 'General & Governance Settings'
        };

        function openSidebar() {
            sidebar.classList.remove('-translate-x-full');
            sidebarOverlay.classList.remove('hidden');
            setTimeout(() => {
                sidebarOverlay.classList.add('opacity-100', 'pointer-events-auto');
            }, 10);
        }

        function closeSidebar() {
            sidebar.classList.add('-translate-x-full');
            sidebarOverlay.classList.remove('opacity-100', 'pointer-events-auto');
            setTimeout(() => {
                sidebarOverlay.classList.add('hidden');
            }, 300);
        }

        openSidebarBtn.addEventListener('click', openSidebar);
        closeSidebarBtn.addEventListener('click', closeSidebar);
        sidebarOverlay.addEventListener('click', closeSidebar);

        function switchView(targetViewId) {
            navLinks.forEach(link => link.classList.remove('active'));

            const activeLink = document.querySelector(`.nav-link[data-target="${targetViewId}"]`);
            if (activeLink) activeLink.classList.add('active');

            if (viewTitles[targetViewId]) {
                pageTitle.innerText = viewTitles[targetViewId];
            }

            if (window.innerWidth < 1024) closeSidebar();

            window.dispatchEvent(new CustomEvent('admin-section-load', { 
                detail: { section: targetViewId } 
            }));
        }

        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const target = link.getAttribute('data-target');
                switchView(target);
                // Update URL without reloading
                history.pushState(null, null, `#${target}`); 
            });
        });

        function handleInitialRoute() {
            const hash = window.location.hash.replace('#', '');
            
            // Wait 100ms so the module JS files have time to attach their event listeners
            // before we dispatch the 'admin-section-load' event.
            if (hash && viewTitles[hash]) {
                setTimeout(() => switchView(hash), 100);
            } else {
                setTimeout(() => switchView('dashboard'), 100);
            }
        }

        // Listen for back/forward buttons
        window.addEventListener('popstate', handleInitialRoute);

    </script>

        window.addEventListener('admin-section-load', (e) => {
            if (e.detail.section === 'blogs') {
                renderBlogsUI(document.getElementById('admin-content'));
            }
        });
    </script>
